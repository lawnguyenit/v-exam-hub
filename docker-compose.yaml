services:
  db:
    image: postgres:16-alpine
    container_name: v_exam_hub_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-v_exam_hub}
    networks:
      - exam_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./v-exam-hub-local-db.session.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v_exam_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: ${PORT:-8080}
      DB_URL: ${DB_URL:-host=db user=admin password=123 dbname=v_exam_hub sslmode=disable}
      DB_STARTUP_TIMEOUT: ${DB_STARTUP_TIMEOUT:-90s}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    networks:
      - exam_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: v_exam_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      NGINX_PORT: ${NGINX_PORT:-80}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-64m}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:8080}
    depends_on:
      - backend
    networks:
      - exam_network

volumes:
  postgres_data:

networks:
  exam_network:
    driver: bridge
