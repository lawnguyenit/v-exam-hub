<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamHub - Xem lại bài thi</title>
  <link rel="stylesheet" href="/static/css/common.css?v=5">
  <link rel="stylesheet" href="/static/css/review.css?v=5">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/student" aria-label="ExamHub">
      <span class="brand-mark">E</span>
      <span>ExamHub</span>
    </a>
    <a class="ghost-btn" href="/student">Về dashboard</a>
  </header>

  <main class="review-page">
    <section class="review-hero">
      <div>
        <p class="eyebrow">Xem lại bài thi</p>
        <h1 id="reviewTitle">Đang tải bài thi</h1>
      </div>
      <div class="review-score">
        <span>Điểm</span>
        <strong id="reviewScore">--</strong>
        <small id="reviewDuration">--</small>
      </div>
    </section>

    <section class="review-list" id="reviewList" aria-label="Danh sách câu đã làm"></section>
  </main>

  <script src="/static/js/review.js?v=5"></script>
</body>
</html>
