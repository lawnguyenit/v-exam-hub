<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamHub - Chọn tư cách đăng nhập</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-page">
  <main class="login-shell" aria-label="Chọn tư cách đăng nhập">
    <section class="login-box">
      <a class="brand" href="/" aria-label="ExamHub">
        <span class="brand-mark">E</span>
        <span>ExamHub</span>
      </a>

      <div class="login-copy">
        <p class="eyebrow">Tài khoản do giáo viên cấp</p>
        <h1>Chọn tư cách đăng nhập</h1>
      </div>

      <nav class="login-bars" aria-label="Vai trò đăng nhập">
        <a class="login-bar teacher" href="/teacher">
          <span>Đăng nhập với tư cách giáo viên</span>
          <strong>Quản lý lớp thi</strong>
        </a>
        <a class="login-bar student" href="/student">
          <span>Đăng nhập với tư cách sinh viên / học sinh</span>
          <strong>Vào dashboard làm bài</strong>
        </a>
      </nav>
    </section>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>
