<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamHub - Đăng nhập giáo viên</title>
  <link rel="stylesheet" href="/static/css/common.css?v=3">
  <link rel="stylesheet" href="/static/css/login.css?v=3">
</head>
<body class="login-page" data-role="teacher">
  <main class="login-shell" aria-label="Đăng nhập giáo viên">
    <section class="login-box form-box">
      <a class="brand" href="/" aria-label="ExamHub">
        <span class="brand-mark">E</span>
        <span>ExamHub</span>
      </a>

      <form class="credential-form standalone" id="credentialForm">
        <div class="form-head">
          <p class="eyebrow">Giáo viên</p>
          <h1>Đăng nhập quản lý lớp thi</h1>
          <p>Tài khoản giáo viên do nhà trường cấp, không mở đăng ký tự do.</p>
        </div>

        <label for="accountInput">Tài khoản</label>
        <input id="accountInput" name="account" type="text" autocomplete="username" placeholder="VD: gv-cntt-01" required>

        <label for="passwordInput">Mật khẩu</label>
        <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="Mật khẩu giáo viên" required>

        <button class="primary-btn" type="submit">Vào dashboard</button>
        <p class="form-message" id="formMessage">Luồng giáo viên hiện là placeholder, nhưng vẫn đi qua bước đăng nhập để giữ đúng flow.</p>
      </form>

      <a class="back-link" href="/">Chọn tư cách khác</a>
    </section>
  </main>

  <script src="/static/js/login.js?v=3"></script>
</body>
</html>
