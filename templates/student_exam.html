<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamHub - Làm bài</title>
  <link rel="stylesheet" href="/static/css/common.css?v=5">
  <link rel="stylesheet" href="/static/css/exam.css?v=5">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/student" aria-label="ExamHub">
      <span class="brand-mark">E</span>
      <span>ExamHub</span>
    </a>
    <a class="ghost-btn" href="/student">Về dashboard</a>
  </header>

  <main class="exam-page">
    <section class="exam-workspace" aria-label="Bài đang làm">
      <article class="exam-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Bài đang làm</p>
            <h1 id="examTitle">Đang tải bài kiểm tra</h1>
          </div>
          <div class="timer" aria-live="polite">
            <span>Còn lại</span>
            <strong id="countdown">--:--</strong>
          </div>
        </div>

        <div class="question-box" aria-live="polite">
          <p class="question-meta" id="questionMeta">Câu -- / --</p>
          <h2 id="questionTitle">Đang tải câu hỏi</h2>
          <div class="answers" id="answers"></div>
        </div>

        <div class="question-nav" id="questionNav" aria-label="Danh sách câu hỏi"></div>

        <div class="exam-actions">
          <button class="ghost-btn" type="button" id="prevQuestion">Câu trước</button>
          <button class="primary-btn" type="button" id="nextQuestion">Lưu và tiếp tục</button>
        </div>
      </article>

      <aside class="student-side">
        <article class="status-panel">
          <p class="eyebrow">Trạng thái</p>
          <h2 id="attemptStateTitle">Kết nối ổn định</h2>
          <p id="attemptStateText">Tiến trình sẽ được tự động lưu khi chọn đáp án hoặc chuyển câu.</p>
        </article>
        <article class="status-panel">
          <p class="eyebrow">Tiến trình hiện tại</p>
          <div class="metric-strip">
            <div><span>Đã trả lời</span><strong id="answeredCount">0/0</strong></div>
            <div><span>Lưu gần nhất</span><strong id="lastSavedAt">--:--</strong></div>
          </div>
        </article>
      </aside>
    </section>
  </main>

  <script src="/static/js/exam.js?v=5"></script>
</body>
</html>
