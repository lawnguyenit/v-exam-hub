<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamHub - Đăng nhập sinh viên</title>
  <link rel="stylesheet" href="/static/css/common.css?v=3">
  <link rel="stylesheet" href="/static/css/login.css?v=3">
</head>
<body class="login-page" data-role="student">
  <main class="login-shell" aria-label="Đăng nhập sinh viên">
    <section class="login-box form-box">
      <a class="brand" href="/" aria-label="ExamHub">
        <span class="brand-mark">E</span>
        <span>ExamHub</span>
      </a>

      <form class="credential-form standalone" id="credentialForm">
        <div class="form-head">
          <p class="eyebrow">Sinh viên / học sinh</p>
          <h1>Đăng nhập để làm bài</h1>
          <p>Tiến trình cũ sẽ được mở lại nếu đăng nhập cùng tài khoản trên trình duyệt này.</p>
        </div>

        <label for="accountInput">Tài khoản</label>
        <input id="accountInput" name="account" type="text" autocomplete="username" placeholder="VD: lnit hoặc lawnguyenit" required>

        <label for="passwordInput">Mật khẩu</label>
        <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="Mật khẩu hoặc mã truy cập" required>

        <button class="primary-btn" type="submit">Vào dashboard</button>
        <p class="form-message" id="formMessage">Bản UI test chấp nhận tài khoản/mật khẩu bất kỳ. Backend thật sẽ xác thực bằng dữ liệu trường cấp.</p>
      </form>

      <a class="back-link" href="/">Chọn tư cách khác</a>
    </section>
  </main>

  <script src="/static/js/login.js?v=3"></script>
</body>
</html>
