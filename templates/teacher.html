<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExamHub - Dashboard giáo viên</title>
  <link rel="stylesheet" href="/static/css/common.css?v=2">
  <link rel="stylesheet" href="/static/css/teacher.css?v=2">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/" aria-label="ExamHub">
      <span class="brand-mark">E</span>
      <span>ExamHub</span>
    </a>
    <a class="ghost-btn" href="/" id="logoutLink">Đổi tư cách</a>
  </header>

  <main class="teacher-dashboard">
    <section class="teacher-panel">
      <p class="eyebrow">Dashboard giáo viên</p>
      <h1>Khu giáo viên sẽ được làm sau</h1>
      <p>Trang này được tách riêng để giữ đúng luồng đăng nhập và chuẩn bị cho quản lý đề thi, ca thi, thống kê lớp.</p>
      <div class="teacher-actions">
        <button class="primary-btn" type="button" disabled>Tạo ca thi</button>
        <button class="ghost-btn" type="button" disabled>Xem thống kê</button>
      </div>
    </section>
  </main>

  <script src="/static/js/teacher.js?v=2"></script>
</body>
</html>
